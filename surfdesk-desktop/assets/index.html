<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurfDesk - Professional Solana Account Studio</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        body { margin: 0; padding: 0; background: #100726; color: #00F5F0; font-family: system-ui, sans-serif; overflow: hidden; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 18px; }
        .loading::after { content: "🌊 Loading SurfDesk..."; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="main" class="loading"></div>
</body>
</html>
